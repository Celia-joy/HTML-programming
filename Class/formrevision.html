<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Form</title>
    </head>
    <body>
        <h3>Student Access Inquiry</h3>
        <form action="#" method="get">
            <lable for name="Firstname">Firstname</lable><br>
            <br>
            <input type="text" id="Firstname" name="Firstname"><br>
            <br>
            <lable for name="Lastname">Lastname</lable><br>
            <br>
            <input type="text" id="Lastname" name="Lastname"><br>
            <br>
            <lable for email="Email">Email</lable><br>
            <br>
            <input type="text" id="Email" name="Email"><br>
            <br>
            <lable for gender="Gender">Gender</lable><br>
            <br>
            <input type="radio" name="Gender" value="Male">Male<br>
            <input type="radio" name="Gender" value="Female">Female<br>
            <br>
            <lable for languages="Spoken languages">Spoken languages</lable><br>
            <br>
            <input type="checkbox" name="Language" value="Kinyarwanda">Kinyarwanda<br>
            <input type="checkbox" name="Language" value="Kiswahili">Kiswahili<br>
            <input type="checkbox" name="Language" value="French">French<br>
            <input type="checkbox" name="Language" value="English">English<br>
            <br>
            <lable for level="level">Level</lable><br>
            <select id="Level" name="Level">
                <option value="Senior 1">Senior 1</option>
                <option value="Senior 2">Senior 2</option>
                <option value="Senior 3">Senior 3</option>
                <option value="Senior 4">Senior 4</option>
                <option value="Senior 5">Senior 5</option>
                <option value="Senior 6">Senior 6</option>
            </select><br>
            <br>
            <lable for name="Password">Password</lable><br>
            <input type="text" id="Password" name="Password"><br>
            <br>
            <lable for name="Request">Request</lable><br>
            <textarea id="Request" name="Request"></textarea><br>
            <br>
            <input type="submit" value="submit"> 
        </form>
    </body>
</html>
