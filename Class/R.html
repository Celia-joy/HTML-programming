<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="device=width-device">
        <title>Document</title>
    </head>
    <body>
        <h1>Students Access Inquiry</h1>
        <form action="#" method="get">
            <label for name="Firstname">Firstname</label><br>
            <input type="text" id="firstname" name="Firstname"><br><br>
            <label for name="Lastname">Lastname</label><br>
            <input type="text" id="Lastname" name="Lastname"><br><br>
            <lable for name="email">Email</lable><br>
            <input type="text" id="Email" name="Email"><br><br>
            <lable for name="Gender">Gender</lable><br>
            <input type="radio" name="Gender" value="Male">Male
            <input type="radio" name="Gender" value="Female">Female<br><br>
            <lable for name="Languages">Languages</lable><br>
            <input type="checkbox" name="Languages" value="Kinyarwanda">Kinyarwanda
            <input type="checkbox" name="Languages" value="Kiswahili">Kiswahili
            <input type="checkbox" name="Languages" value="French">French
            <input type="checkbox" name="Languages" value="English">English<br><br>
            <lable for name="Level">Level</lable><br>
            <select id="level" name="Level">
                <option>Senior 1</option>
                <option>Senior 2</option>
                <option>Senior 3</option>
                <option>Senior 4</option>
                <option>Senior 5</option>
                <option>Senior 6</option>
            </select><br><br>
            <lable for name="Password">Password</lable><br>
            <input type="password" id="password" name="Password"><br><br>
            <lable for name="Request">Request</lable><br>
            <textarea id="request" name="Request"></textarea><br><br>
            <input type="submit" value="submit">
        </form>
    </body>
</html>
