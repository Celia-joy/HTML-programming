<!DOCTYPE html>
<html>
    <head>    
        <meta charset="UTF-8">
        <title>Table</title>
        <style>
            
            table, td, th
            {
                border: 1px solid black;
                border-collapse:collapse; 
            }
            </style>
    </head>
    <body>
        <table>
            <caption>Population in cell A and B</caption>
                <tr>
                    <th rowspan="3">Cell</th>
                </tr>
                <tr>
                    <th colspan="2">0-15</th>
                    <th colspan="2">16-35</th>
                    <th colspan="2">36-45</th>
                    <th colspan="2">56-above</th>
                </tr>
                <tr>
                    <th>Men</th>
                    <th>Women</th>
                    <th>Men</th>
                    <th>Women</th>
                    <th>Men</th>
                    <th>Women</th>
                    <th>Men</th>
                    <th>Women</th>
                </tr>   
            
            <tr>
                <td>A</td>
                <td>800</td>
                <td>700</td>
                <td>700</td>
                <td>800</td>
                <td>900</td>
                <td>900</td>
                <td>800</td>
                <td>800</td>
            </tr>
            <tr>
                <td>B</td>
                <td>800</td>
                <td>700</td>
                <td>700</td>
                <td>800</td>
                <td>900</td>
                <td>900</td>
                <td>800</td>
                <td>800</td>
            </tr>
            <tr>
                <td>Total</td>
                <th colspan="2">1500</th>
                <th colspan="2">1500</th>
                <th colspan="2">1800</th>
                <th colspan="2">1600</th>
            </tr>
        </table>
    </body>
</html>
