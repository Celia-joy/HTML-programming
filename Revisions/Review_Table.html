<!DOCTYPE html>

    <head>

        <title>Table for cells</title>
        <style>
          h1{
            font-weight:bold;
            color: antiquewhite;
            text-align:center;
            margin-top:100px;
          }
          td{
            border: 1px solid black;
            border-collapse:collapse;
          }
          th{
           border: 1px solid black;
           border-collapse:collapse;
           color:darkgreen;
            
          }
           table{
            border: 1px solid black;
            border-collapse:collapse;

            transition:transform 0.5s ease-in-out, box-shadow 0.5s ease-in-out;

          table:hover{
            transform:scale(1.1);

          }

                padding:50px;

                text-decoration:none;

            }
            .main-nav a:hover{
                transform:scale(1.1);
                box-shadow:0 15px 30px darkseagreen;
            }
            .svg-container{
              width:600px;
              margin-left: auto;
              margin-right:auto;
            }
              svg{
                display: block;
                margin: auto;
                transition:transform 0.5s ease-in-out, box-shadow 0.5s ease-in-out;

              svg:hover{
                transform: scale(1.1);
                box-shadow:0 15px 30px darkgrey;
