<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table,th,td {
            border: 1px solid black;
            border-collapse:collapse;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th rowspan="3">Cell</th>
        </tr>
        <tr>
            <th colspan="2">0-15</th>
            <th colspan="2">16-35</th>
            <th colspan="2">36-45</th>
            <th colspan="2">56-above</th>
        </tr>
        <tr>
            <td>Men</td>
            <td>Women</td>
            <td>Men</td>
            <td>Women</td>
            <td>Men</td>
            <td>Women</td>
            <td>Men</td>
            <td>Women</td>
        </tr>
        <tr>
            <td>A</td>
            <td>800</td>
            <td>700</td>
            <td>700</td>
            <td>800</td>
            <td>900</td>
            <td>900</td>
            <td>800</td>
            <td>800</td>
        </tr>
        <tr>
            <td>B</td>
            <td>800</td>
            <td>700</td>
            <td>700</td>
            <td>800</td>
            <td>900</td>
            <td>900</td>
            <td>800</td>
            <td>800</td>

        </tr>
        <tr>
            <td>Total</td>
            <th colspan="2">1500</th>
            <th colspan="2">1500</th>
            <th colspan="2">1800</th>
            <th colspan="2">1600</th>
        </tr>
    </table>    
</body>
</html>
